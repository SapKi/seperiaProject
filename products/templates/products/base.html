<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Product Catalog{% endblock %}</title>
  <style>
    /* ── Reset & base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Page header ────────────────────────────────────── */
    .page-header {
      background: #1a1a2e;
      color: #ffffff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .page-header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: .4px; }
    .page-header .subtitle { font-size: .85rem; color: #a0aec0; margin-top: 2px; }

    /* ── Layout container ───────────────────────────────── */
    .container { max-width: 1500px; margin: 0 auto; padding: 28px 24px; }

    /* ── Toolbar (search + meta) ────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .search-form {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 260px;
      max-width: 480px;
    }
    .search-form input[type="text"] {
      flex: 1;
      padding: 9px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      font-size: .9rem;
      transition: border-color .2s;
      background: #fff;
    }
    .search-form input[type="text"]:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.15);
    }
    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 6px;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: filter .15s, opacity .15s;
      white-space: nowrap;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn-primary  { background: #4f46e5; color: #fff; }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .btn-gallery  {
      background: #7c3aed;
      color: #fff;
      padding: 5px 12px;
      font-size: .8rem;
    }
    .btn-gallery.open { background: #6b21a8; }

    .meta-info {
      margin-left: auto;
      font-size: .85rem;
      color: #6b7280;
      white-space: nowrap;
    }

    /* ── Alert / error banner ───────────────────────────── */
    .alert-error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      padding: 12px 18px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    /* ── Table wrapper (horizontal scroll on small screens) */
    .table-wrapper {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      overflow: hidden;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .875rem;
    }

    thead th {
      background: #1a1a2e;
      color: #e2e8f0;
      padding: 13px 14px;
      text-align: left;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      white-space: nowrap;
    }

    tbody tr.product-row {
      border-bottom: 1px solid #f3f4f6;
      transition: background .15s;
    }
    tbody tr.product-row:last-child { border-bottom: none; }
    tbody tr.product-row:hover { background: #fafafa; }

    td { padding: 11px 14px; vertical-align: middle; }

    .td-title { font-weight: 600; white-space: nowrap; }
    .td-desc {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #6b7280;
      font-size: .82rem;
    }
    .td-price { font-weight: 700; color: #059669; white-space: nowrap; }
    .td-rating { white-space: nowrap; }
    .stars { color: #f59e0b; }
    .td-stock { white-space: nowrap; }
    .stock-low  { color: #dc2626; font-weight: 600; }
    .stock-mid  { color: #d97706; font-weight: 600; }
    .stock-ok   { color: #059669; }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 500;
      background: #ede9fe;
      color: #5b21b6;
      white-space: nowrap;
    }

    .thumbnail {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 6px;
      display: block;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }

    /* ── Gallery inline row ─────────────────────────────── */
    tr.gallery-row td {
      background: #f5f3ff;
      padding: 18px 20px;
      border-bottom: 1px solid #ddd6fe;
    }
    .gallery-strip {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .gallery-strip img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.15);
      transition: transform .2s;
    }
    .gallery-strip img:hover { transform: scale(1.04); }
    .gallery-empty { font-size: .85rem; color: #9ca3af; font-style: italic; }

    /* ── Empty state ────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
    }
    .empty-state h3 { font-size: 1.1rem; margin-bottom: 6px; }

    /* ── Pagination ─────────────────────────────────────── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 26px;
      flex-wrap: wrap;
    }
    .pagination a, .pagination span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      text-decoration: none;
      color: #374151;
      font-size: .875rem;
      transition: background .15s, border-color .15s;
    }
    .pagination a:hover { background: #f3f4f6; border-color: #9ca3af; }
    .pagination .current {
      background: #4f46e5;
      color: #fff;
      border-color: #4f46e5;
      font-weight: 600;
    }
    .pagination .disabled { color: #d1d5db; pointer-events: none; }
  </style>
</head>
<body>

  <header class="page-header">
    <div>
      <h1>Product Catalog</h1>
      <div class="subtitle">Powered by DummyJSON</div>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
