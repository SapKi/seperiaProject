{% extends "products/base.html" %}

{% block title %}Product Catalog{% endblock %}

{% block content %}

  <!-- ── Toolbar ──────────────────────────────────────────────── -->
  <div class="toolbar">
    <form id="search-form" class="search-form" role="search">
      <input
        type="text"
        id="search-input"
        placeholder="Search products…"
        aria-label="Search products"
        autocomplete="off"
        autofocus
      />
      <button type="submit" class="btn btn-primary">Search</button>
      <button type="button" id="clear-btn" class="btn btn-secondary" hidden>Clear</button>
    </form>
    <div class="meta-info" id="meta-info" aria-live="polite"></div>
  </div>

  <!-- ── Error banner ─────────────────────────────────────────── -->
  <div id="error-banner" class="alert-error" role="alert" hidden></div>

  <!-- ── Product table ────────────────────────────────────────── -->
  <div class="table-wrapper">
    <table aria-label="Product list">
      <thead>
        <tr>
          <th>Thumbnail</th>
          <th>Title</th>
          <th>Description</th>
          <th>Price</th>
          <th>Rating</th>
          <th>Stock</th>
          <th>Brand</th>
          <th>Category</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="products-body">
        <tr><td colspan="9" class="loading">Loading&hellip;</td></tr>
      </tbody>
    </table>
  </div>

  <!-- ── Pagination ────────────────────────────────────────────── -->
  <nav class="pagination" id="pagination" aria-label="Page navigation"></nav>

{% endblock %}


{% block scripts %}
<script>
/**
 * Products Catalog — vanilla JS, no frameworks.
 *
 * Architecture:
 *  - All DummyJSON API calls are made by the Django backend (/api/products/).
 *  - This script calls the Django endpoint, then renders the table and
 *    pagination entirely client-side.
 *  - The Gallery feature opens an inline image strip without a page reload
 *    or additional network requests (images come from the initial API response).
 */
(function () {
  'use strict';

  // ── Configuration ──────────────────────────────────────────────
  var CONFIG = {
    apiUrl:       '/api/products/',
    defaultLimit: 10,
  };

  // ── State ──────────────────────────────────────────────────────
  var state = {
    page:    1,
    limit:   CONFIG.defaultLimit,
    search:  '',
    loading: false,
  };

  // ── DOM references ─────────────────────────────────────────────
  var dom = {
    searchForm:  document.getElementById('search-form'),
    searchInput: document.getElementById('search-input'),
    clearBtn:    document.getElementById('clear-btn'),
    metaInfo:    document.getElementById('meta-info'),
    errorBanner: document.getElementById('error-banner'),
    tbody:       document.getElementById('products-body'),
    pagination:  document.getElementById('pagination'),
  };

  // ── Utilities ──────────────────────────────────────────────────

  /**
   * HTML-escape a value for safe insertion into innerHTML.
   * Escapes &, <, >, and " so it is safe in both text nodes and attribute values.
   */
  function esc(value) {
    return String(value == null ? '' : value)
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;');
  }

  function stockClass(stock) {
    if (stock <= 10) return 'stock-low';
    if (stock <= 30) return 'stock-mid';
    return 'stock-ok';
  }

  // ── API ────────────────────────────────────────────────────────

  function buildApiUrl(page, limit, search) {
    var params = 'page=' + encodeURIComponent(page) +
                 '&limit=' + encodeURIComponent(limit);
    if (search) params += '&search=' + encodeURIComponent(search);
    return CONFIG.apiUrl + '?' + params;
  }

  function fetchProducts(page, limit, search) {
    return fetch(buildApiUrl(page, limit, search))
      .then(function (res) {
        if (!res.ok) throw new Error('Server returned ' + res.status);
        return res.json();
      });
  }

  // ── Rendering ──────────────────────────────────────────────────

  function renderRows(products) {
    dom.tbody.innerHTML = '';

    if (!products || !products.length) {
      var empty = document.createElement('tr');
      empty.innerHTML =
        '<td colspan="9">' +
          '<div class="empty-state">' +
            '<h3>No products found</h3>' +
            '<p>Try a different search term or clear the filter.</p>' +
          '</div>' +
        '</td>';
      dom.tbody.appendChild(empty);
      return;
    }

    products.forEach(function (p) {
      var tr = document.createElement('tr');
      tr.className = 'product-row';
      tr.dataset.productId = p.id;
      // Store image URLs in a data attribute; the gallery reads from here —
      // no second network request is needed when the user opens the gallery.
      tr.dataset.images = JSON.stringify(p.images || []);

      tr.innerHTML =
        '<td>' +
          '<img class="thumbnail"' +
              ' src="' + esc(p.thumbnail) + '"' +
              ' alt="' + esc(p.title) + ' thumbnail"' +
              ' loading="lazy" />' +
        '</td>' +
        '<td class="td-title">'  + esc(p.title)       + '</td>' +
        '<td>' +
          '<span class="td-desc" title="' + esc(p.description) + '">' +
            esc(p.description) +
          '</span>' +
        '</td>' +
        '<td class="td-price">$' + esc(p.price)       + '</td>' +
        '<td class="td-rating">' +
          '<span class="stars" aria-hidden="true">&#9733;</span> ' +
          esc(p.rating) +
        '</td>' +
        '<td>' +
          '<span class="' + stockClass(p.stock) + '">' + esc(p.stock) + '</span>' +
        '</td>' +
        '<td>' + esc(p.brand)    + '</td>' +
        '<td><span class="badge">' + esc(p.category) + '</span></td>' +
        '<td>' +
          '<button class="btn btn-gallery"' +
                  ' aria-expanded="false"' +
                  ' aria-label="Toggle image gallery for ' + esc(p.title) + '">' +
            'Gallery' +
          '</button>' +
        '</td>';

      dom.tbody.appendChild(tr);
    });
  }

  function renderPagination(totalPages, currentPage) {
    dom.pagination.innerHTML = '';
    if (totalPages <= 1) return;

    function makeBtn(label, targetPage, disabled, active) {
      if (disabled) {
        var s = document.createElement('span');
        s.className   = 'disabled';
        s.innerHTML   = label;
        return s;
      }
      var a = document.createElement('a');
      a.href    = '#';
      a.innerHTML = label;
      if (active) {
        a.className = 'current';
        a.setAttribute('aria-current', 'page');
      }
      a.addEventListener('click', function (e) {
        e.preventDefault();
        load(targetPage);
      });
      return a;
    }

    dom.pagination.appendChild(makeBtn('&laquo; Prev', currentPage - 1, currentPage === 1));

    var winStart = Math.max(1, currentPage - 2);
    var winEnd   = Math.min(totalPages, currentPage + 2);
    for (var p = winStart; p <= winEnd; p++) {
      dom.pagination.appendChild(makeBtn(p, p, false, p === currentPage));
    }

    dom.pagination.appendChild(makeBtn('Next &raquo;', currentPage + 1, currentPage === totalPages));
  }

  function renderMeta(total, totalPages) {
    if (state.search) {
      dom.metaInfo.innerHTML =
        '<strong>' + total + '</strong> ' +
        'result' + (total !== 1 ? 's' : '') +
        ' for &ldquo;' + esc(state.search) + '&rdquo;';
    } else {
      dom.metaInfo.innerHTML =
        '<strong>' + total + '</strong> ' +
        'product' + (total !== 1 ? 's' : '') +
        ' &mdash; page ' + state.page + ' of ' + totalPages;
    }
  }

  // ── Load ────────────────────────────────────────────────────────

  function load(page) {
    if (state.loading) return;
    state.page  = page;
    state.loading = true;

    dom.tbody.innerHTML = '<tr><td colspan="9" class="loading">Loading&hellip;</td></tr>';
    dom.errorBanner.hidden = true;
    dom.pagination.innerHTML = '';

    fetchProducts(state.page, state.limit, state.search)
      .then(function (data) {
        renderRows(data.products);
        renderPagination(data.total_pages, data.page);
        renderMeta(data.total, data.total_pages);
      })
      .catch(function (err) {
        dom.errorBanner.textContent = err.message || 'Failed to load products.';
        dom.errorBanner.hidden = false;
        dom.tbody.innerHTML = '';
      })
      .finally(function () {
        state.loading = false;
      });
  }

  // ── Gallery ─────────────────────────────────────────────────────

  /**
   * Insert (or remove) an image-strip row directly after the clicked product row.
   * Images are read from the row's data-images attribute — no extra API call.
   */
  function toggleGallery(button) {
    var row       = button.closest('tr');
    var productId = row.dataset.productId;
    var galleryId = 'gallery-' + productId;
    var existing  = document.getElementById(galleryId);

    if (existing) {
      existing.remove();
      button.textContent = 'Gallery';
      button.classList.remove('open');
      button.setAttribute('aria-expanded', 'false');
      return;
    }

    var images = [];
    try { images = JSON.parse(row.dataset.images).slice(0, 3); } catch (_) {}

    var galleryRow    = document.createElement('tr');
    galleryRow.id     = galleryId;
    galleryRow.className = 'gallery-row';

    var td      = document.createElement('td');
    td.colSpan  = 9;

    var strip   = document.createElement('div');
    strip.className = 'gallery-strip';

    if (!images.length) {
      var msg       = document.createElement('span');
      msg.className   = 'gallery-empty';
      msg.textContent = 'No images available for this product.';
      strip.appendChild(msg);
    } else {
      images.forEach(function (src) {
        var img   = document.createElement('img');
        img.src   = src;       // set via property — browser treats as URL, not markup
        img.alt   = 'Product image';
        img.loading = 'lazy';
        strip.appendChild(img);
      });
    }

    td.appendChild(strip);
    galleryRow.appendChild(td);
    row.insertAdjacentElement('afterend', galleryRow);

    button.textContent = 'Close Gallery';
    button.classList.add('open');
    button.setAttribute('aria-expanded', 'true');
  }

  // ── Event delegation ─────────────────────────────────────────────
  // Use one delegated listener on tbody instead of per-row onclick handlers.
  dom.tbody.addEventListener('click', function (e) {
    var btn = e.target.closest('.btn-gallery');
    if (btn) toggleGallery(btn);
  });

  dom.searchForm.addEventListener('submit', function (e) {
    e.preventDefault();
    state.search = dom.searchInput.value.trim();
    dom.clearBtn.hidden = !state.search;
    load(1);
  });

  dom.clearBtn.addEventListener('click', function () {
    dom.searchInput.value = '';
    state.search = '';
    dom.clearBtn.hidden = true;
    load(1);
  });

  // ── Boot ─────────────────────────────────────────────────────────
  load(1);

}());
</script>
{% endblock %}
